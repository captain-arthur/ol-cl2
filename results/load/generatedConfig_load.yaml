  enableexistingnamespaces: false
  deletenamespacetimeout: 600000000000
steps:
- phases: []
  measurements:
  - method: APIResponsivenessPrometheus
    params:
      action: start
      allowedSlowCalls: 0
      customThresholds: ""
      enableViolations: false
    identifier: APIResponsivenessPrometheus
    instances: []
  - method: APIResponsivenessPrometheus
    params:
      action: start
      allowedSlowCalls: 0
      customThresholds: ""
      enableViolations: true
      summaryName: APIResponsivenessPrometheus_simple
      useSimpleLatencyQuery: true
    identifier: APIResponsivenessPrometheusSimple
    instances: []
  - method: PodStartupLatency
    params:
      action: start
      labelSelector: group = load
      threshold: 1h
    identifier: CreatePhasePodStartupLatency
    instances: []
  - method: InClusterNetworkLatency
    params:
      action: start
      checkProbesReadyTimeout: 15m
      pingSleepDuration: 1s
      replicasPerProbe: 2
      threshold: 0s
    identifier: InClusterNetworkLatency
    instances: []
  - method: SLOMeasurement
    params:
      action: start
      checkProbesReadyTimeout: 15m
      replicasPerProbe: 2
    identifier: SLOMeasurement
    instances: []
  - method: NetworkProgrammingLatency
    params:
      action: start
      enableViolations: false
      threshold: 30s
    identifier: NetworkProgrammingLatency
    instances: []
  - method: GenericPrometheusQuery
    params:
      action: start
      metricName: KubeProxyIptablesRestoreFailures
      metricVersion: v1alpha1
      queries:
      - name: Total
        query: sum(kubeproxy_sync_proxy_rules_iptables_partial_restore_failures_total)
        requireSamples: false
        threshold: 0
      unit: failures
    identifier: Kube-proxy partial iptables restore failures
    instances: []
  - method: TestMetrics
    params:
      action: start
      clusterOOMsIgnoredProcesses: ""
      clusterOOMsTrackerEnabled: true
      enableRestartCountCheck: true
      restartCountThresholdOverrides: ""
      systemPodMetricsEnabled: true
    identifier: TestMetrics
    instances: []
  - method: GenericPrometheusQuery
    params:
      action: start
      dimensions:
      - resource
      - group
      metricName: ResourceSize
      metricVersion: v1
      queries:
      - name: Perc99
        query: quantile_over_time(0.99, sum by (group, resource) (apiserver_resource_size_estimate_bytes
          / 1024 / 1024)[%v:])
      - name: max
        query: max_over_time(sum by (group, resource) (apiserver_resource_size_estimate_bytes
          / 1024 / 1024)[%v:])
      unit: MiB
    identifier: ResourceSize
    instances: []
  module:
    path: ""
    params: {}
