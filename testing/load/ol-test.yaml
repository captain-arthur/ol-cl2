# =============================================================================
# Load 테스트 오버라이드 — 클러스터 인수 테스트용 SLI/SLO 기반
# =============================================================================
# 목표: ClusterLoader2 기본 임계치를 기준으로, 우리 클러스터(소규모/로컬)에 맞는
#       값을 조정하여 관리자·사용자 관점에서 납득 가능한 인수 기준을 만든다.
# 기준: Kubernetes 공식 SLO 및 CL2 기본값 → 필요 시 완화(이유 명시).
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 워크로드 규모 (노드 수 대비 비율)
# -----------------------------------------------------------------------------
# 100노드 기준 대규모 시나리오의 약 3% 수준으로 설정.
# 근거: 로컬/소규모 클러스터에서 동일 비율로 부하를 주어 동작·지표를 검증.

PODS_PER_NODE: 30

# 컨트롤러당 레플리카 수 (기본 250/30/5 → 3% ≈ 8/1/1)
BIG_GROUP_SIZE: 8
MEDIUM_GROUP_SIZE: 1
SMALL_GROUP_SIZE: 1

# -----------------------------------------------------------------------------
# 2. 처리량 (초당 Pod 생성/삭제)
# -----------------------------------------------------------------------------
# 기본 CL2: 10 pods/s. 소규모에서는 그대로 두거나 약간 낮춰도 됨.
# 값을 올리면 테스트 시간은 짧아지지만, API/스케줄러 부하가 커져 지표가 나빠질 수 있음.

# CL2_LOAD_TEST_THROUGHPUT: 10
# CL2_DELETE_TEST_THROUGHPUT: 10

# -----------------------------------------------------------------------------
# 3. Pod 시작 지연 (사용자 체감: "파드가 얼마나 빨리 뜨는가")
# -----------------------------------------------------------------------------
# Kubernetes 공식 Pod Startup Latency SLO: 5s (P99).
# 참고: https://github.com/kubernetes/community/blob/master/sig-scalability/slos/pod_startup_latency.md
# 소규모 클러스터에서는 5s 유지 권장. 이미지 풀 등으로 지연되면 10s까지 완화 가능(이유 기록).

CL2_POD_STARTUP_LATENCY_THRESHOLD: "5s"

# -----------------------------------------------------------------------------
# 4. API 응답 지연 (사용자 체감: "kubectl/API가 얼마나 빨리 응답하는가")
# -----------------------------------------------------------------------------
# Kubernetes 공식 API Call Latency SLO:
#   - 단일 리소스(GET/PUT 등): P99 ≤ 1s
#   - LIST(네임스페이스): P99 ≤ 5s
#   - LIST(클러스터): P99 ≤ 30s
# 참고: https://github.com/kubernetes/community/blob/master/sig-scalability/slos/api_call_latency.md
# 위 기준은 코드 기본값으로 적용됨. 특정 API만 완화할 때만 아래 사용.

# CL2_ALLOWED_SLOW_API_CALLS: 0   # 임계치 초과 허용 횟수 (0 = 엄격)
# CL2_ENABLE_VIOLATIONS_FOR_API_CALL_PROMETHEUS_SIMPLE: true  # true면 초과 시 테스트 실패

# 특정 API에 대한 커스텀 임계치(필요 시). 기본 SLO보다 완화할 때만 추가.
# CUSTOM_API_CALL_THRESHOLDS: |
#   - verb: PUT
#     resource: leases
#     subresource: ''
#     scope: namespace
#     threshold: 500ms
#   - verb: DELETE
#     resource: pods
#     subresource: ''
#     scope: namespace
#     threshold: 700ms

# -----------------------------------------------------------------------------
# 5. 네트워크 프로그래밍 지연 (사용자 체감: "서비스/엔드포인트 변경이 얼마나 빨리 반영되는가")
# -----------------------------------------------------------------------------
# CL2 기본: 30s. Kubernetes SLO 문서 권장과 동일.
# 참고: https://github.com/kubernetes/community/blob/master/sig-scalability/slos/network_programming_latency.md

CL2_NETWORK_PROGRAMMING_LATENCY_THRESHOLD: "30s"
# 위 임계치를 검증해서 초과 시 실패로 처리할지 (true = 실패 처리)
CL2_ENABLE_VIOLATIONS_FOR_NETWORK_PROGRAMMING_LATENCIES: false

# -----------------------------------------------------------------------------
# 6. 클러스터 내 네트워크 지연 (사용자 체감: "파드 간 통신이 얼마나 빠른가")
# -----------------------------------------------------------------------------
# 0s = 위반 검사 비활성(지표만 수집). 임계치를 두려면 예: "50ms", "100ms" 등으로 설정.

CL2_NETWORK_LATENCY_THRESHOLD: "0s"

# -----------------------------------------------------------------------------
# 7. API 가용성 (사용자 체감: "클러스터 API가 얼마나 안정적으로 응답하는가")
# -----------------------------------------------------------------------------
# CL2 기본: 99.5%. 측정하려면 CL2_ENABLE_API_AVAILABILITY_MEASUREMENT: true 필요.

# CL2_ENABLE_API_AVAILABILITY_MEASUREMENT: false
# CL2_API_AVAILABILITY_PERCENTAGE_THRESHOLD: 99.5

# -----------------------------------------------------------------------------
# 8. 스케줄러 처리량 (관리자 관점: "초당 스케줄링 가능한 파드 수")
# -----------------------------------------------------------------------------
# CL2 기본: 100 pods/s. 소규모에서는 더 낮아도 됨. 미달 시 실패 처리하려면 해당 모듈에서 사용.

# CL2_SCHEDULER_THROUGHPUT_THRESHOLD: 100

# -----------------------------------------------------------------------------
# 9. DNS / 기타 (필요 시 활성화 후 임계치 조정)
# -----------------------------------------------------------------------------
# CL2_NODE_LOCAL_DNS_LATENCY_THRESHOLD: "5s"
# CL2_DNS_LOOKUP_LATENCY_50_THRESHOLD: 0.02
# CL2_DNS_LOOKUP_LATENCY_99_THRESHOLD: 0.1
# CL2_DNS_ERROR_PERC_THRESHOLD: 0.1

# -----------------------------------------------------------------------------
# 10. Prometheus / 인프라
# -----------------------------------------------------------------------------
PROMETHEUS_APISERVER_SCRAPE_PORT: 6443
# PROMETHEUS_SCRAPE_KUBE_PROXY: true  # NetworkProgrammingLatency 사용 시 true 유지
